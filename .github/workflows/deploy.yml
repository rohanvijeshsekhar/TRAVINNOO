name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 22
          command_timeout: 15m
          script: |
            cd ~/travinno

            # ── ONE-TIME CLEANUP: kill any stale pm2 process from a previous bad deploy ──
            # pm2 conflicts with Phusion Passenger on Hostinger by binding to port 3000
            # instead of the LSNODE_SOCKET UNIX socket. This ensures pm2 never runs here.
            pm2 stop travinno 2>/dev/null || true
            pm2 delete travinno 2>/dev/null || true
            pm2 save --force 2>/dev/null || true

            # Force-clean any local changes that might block git pull
            # (e.g. from a previous failed rsync deployment)
            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude='.env' --exclude='*.db' --exclude='travinno-data.json'

            # Install ALL dependencies (dev deps needed for Next.js build)
            npm ci

            # Build with increased memory limit to prevent OOM crashes on shared hosting
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm run build

            # ── Restart the Node.js app ─────────────────────────────────────────────
            # Hostinger runs Node.js via Phusion Passenger / LiteSpeed.
            # Passenger spawns server.js itself, injecting LSNODE_SOCKET so the app
            # listens on a UNIX socket (not port 3000).
            # The ONLY correct restart mechanism on Hostinger is touching tmp/restart.txt.
            # Do NOT use pm2 here — it conflicts with Passenger by binding to port 3000
            # while Passenger expects its UNIX socket, breaking all request handling.
            mkdir -p tmp
            touch tmp/restart.txt
            echo "🔄 Passenger restart triggered via tmp/restart.txt"

            echo "✅ Travinno deployment complete"
