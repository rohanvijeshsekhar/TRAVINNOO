name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 22
          script: |
            # Navigate to the app directory on Hostinger
            cd ~/travinno

            # Pull latest code from GitHub
            git pull origin main

            # Install dependencies (production + dev for build)
            npm ci

            # Build the Next.js production bundle
            npm run build

            # Restart the Node.js app via Hostinger's process manager
            # Hostinger uses passenger-status or pm2 — try both
            if command -v pm2 &> /dev/null; then
              pm2 restart travinno || pm2 start server.js --name travinno
            else
              echo "Deployment complete — restart Node.js app from Hostinger hPanel"
            fi

            echo "✅ Travinno deployment complete"
