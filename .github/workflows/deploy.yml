name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 22
          command_timeout: 15m
          script: |
            cd ~/travinno

            # Force-clean any local changes that might block git pull
            # (e.g. from a previous failed rsync deployment)
            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude='.env' --exclude='*.db' --exclude='travinno-data.json'

            # Install ALL dependencies (dev deps needed for Next.js build)
            npm ci

            # Build with increased memory limit to prevent OOM crashes on shared hosting
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm run build

            # Zero-downtime restart: pm2 reload keeps old process alive until new one is ready
            if command -v pm2 &> /dev/null; then
              pm2 reload travinno --update-env 2>/dev/null || \
              pm2 restart travinno 2>/dev/null || \
              pm2 start server.js --name travinno
            else
              echo "pm2 not found — please restart Node.js app from Hostinger hPanel"
            fi

            echo "✅ Travinno deployment complete"
